<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Migrar datos a Presupuesta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0f1a;--s1:#111521;--s2:#181d2e;--t1:#edf0ff;--t2:#8e99bb;--g:#10d48e;--g2:#0aad72;--r:#f87171;--v:#818df8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.box{background:var(--s1);border:1px solid rgba(255,255,255,.13);border-radius:22px;padding:2rem;max-width:480px;width:100%}
h1{font-size:20px;margin-bottom:8px}
p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:1rem}
input[type=file]{width:100%;background:var(--s2);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:10px;color:var(--t1);margin-bottom:1rem;font-size:13px}
button{background:var(--g);color:#000;border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-size:13px;cursor:pointer;width:100%}
button:disabled{opacity:.4;cursor:not-allowed}
#log{margin-top:1rem;font-family:monospace;font-size:12px;color:var(--t2);max-height:240px;overflow-y:auto;background:var(--s2);border-radius:10px;padding:10px;display:none;white-space:pre-wrap}
.ok{color:var(--g)}.err{color:var(--r)}
</style>
</head>
<body>
<div class="box">
  <h1>📦 Migrar tus datos existentes</h1>
  <p>Sube el archivo <code>presupuesta.json</code> que está en la carpeta <code>data</code> de tu instalación anterior. Esto se hace <strong>una sola vez</strong> y subirá tus períodos y gastos a tu cuenta.</p>
  <p>Primero inicia sesión en la app normal, luego vuelve aquí.</p>
  <input type="file" id="file-inp" accept=".json">
  <button id="btn-migrate" disabled>Iniciar migración</button>
  <div id="log"></div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./js/supabase-client.js"></script>
<script>
let fileData=null;
const log=(msg,cls='')=>{const el=document.getElementById('log');el.style.display='block';el.innerHTML+=`<div class="${cls}">${msg}</div>`;el.scrollTop=el.scrollHeight};

document.getElementById('file-inp').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f)return;
  try{
    fileData=JSON.parse(await f.text());
    document.getElementById('btn-migrate').disabled=false;
    log(`Archivo leído: ${fileData.periodos?.length||0} períodos, ${fileData.gastos?.length||0} gastos.`,'ok');
  }catch(err){ log('Error leyendo el archivo: '+err.message,'err'); }
});

document.getElementById('btn-migrate').addEventListener('click',async()=>{
  const { data:{session} } = await sb.auth.getSession();
  if(!session?.user){ log('Debes iniciar sesión en la app primero (abre index.html, entra, y vuelve aquí).','err'); return; }
  const uid=session.user.id;
  document.getElementById('btn-migrate').disabled=true;
  log('Iniciando migración para '+session.user.email+'...');

  const idMap={}; // id viejo de período -> id nuevo de Supabase
  for(const p of (fileData.periodos||[])){
    const {id, ...rest} = p;
    const payload={...rest, user_id:uid};
    const {data,error}=await sb.from('periodos').insert(payload).select().single();
    if(error){ log(`✗ Error en período "${p.label}": ${error.message}`,'err'); continue; }
    idMap[id]=data.id;
    log(`✓ Período migrado: ${p.label}`,'ok');
  }
  let gOk=0, gErr=0;
  for(const g of (fileData.gastos||[])){
    const newPid=idMap[g.periodo_id];
    if(!newPid){ gErr++; continue; }
    const {id, periodo_id, ...rest} = g;
    const payload={...rest, periodo_id:newPid, user_id:uid};
    const {error}=await sb.from('gastos').insert(payload);
    if(error){ gErr++; } else { gOk++; }
  }
  log(`✓ Gastos migrados: ${gOk} (errores: ${gErr})`, gErr>0?'err':'ok');
  log('Migración completa. Ya puedes volver a la app normal.','ok');
});
</script>
</body>
</html>
